# =============================================================================
# FAQ Data - Clash 常见问题
# =============================================================================

- q: Clash 是什么？
  a: Clash 是一个基于规则的代理软件，支持多种代理协议，广泛用于网络访问优化。

- q: Clash 和 Clash Meta 有什么区别？
  a: Clash Meta 是 Clash 的进阶分支，支持更多协议（如 VLESS、XTLS）、更灵活的规则系统，性能也更优。

- q: 什么是 Clash 订阅？
  a: 订阅是服务商提供的节点配置文件链接，导入 Clash 后自动获取节点列表。

- q: 如何导入 Clash 订阅？
  a: 在 Clash 客户端中找到「订阅」或「配置文件」选项，粘贴订阅链接并导入即可。

- q: Clash 无法连接怎么办？
  a: 检查节点是否过期、切换节点测试、检查系统代理设置是否开启。

- q: 什么是 TUN 模式？
  a: TUN 模式可以在系统层面接管所有流量，让不支持代理的应用程序也走代理。

- q: Clash 和 VPN 有什么区别？
  a: Clash 是基于规则的代理工具，可以灵活选择哪些流量走代理；VPN 是所有流量都走加密隧道。

- q: 如何更新 Clash 订阅？
  a: 在客户端中找到「更新订阅」或「更新节点」按钮手动更新，或设置自动更新间隔。

- q: Clash 配置文件是 YAML 格式吗？
  a: 是的，Clash 使用 YAML 格式的配置文件，包括 proxies、rules、dns 等部分。

- q: 为什么 Clash 节点超时？
  a: 可能是节点服务器不稳定、本地网络问题或节点已被封禁，建议切换节点测试。
